<!DOCTYPE html>
<html>
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⏰</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    font-family: Arial;
    background: #f4f6f9;
    padding: 20px;
  }

  .container {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .card {
    width: 350px;
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
  }

  h2 {
    text-align: center;
  }

  input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    box-sizing: border-box;
    border: 1px solid #ccc;
    font-size: 16px;
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
  }

  .result {
    margin-top: 20px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
  }

  .credit {
    text-align: center;
    margin-top: 20px;
    color: #888;
  }
</style>
</head>

<body>

<div class="container">

  <!-- ZA Rechner -->
  <div class="card">
    <h2>ZA Rechner</h2>

    <label>Startzeit</label>
    <input type="time" id="start">

    <label>Endzeit</label>
    <input type="time" id="end" onchange="autoPause()">

    <label>Pause (gesamt)</label>
    <input type="time" id="pause" value="00:45">

    <label>Sollzeit</label>
    <input type="time" id="soll" value="07:00">

    <button onclick="calc()">Berechnen</button>

    <div class="result" id="result"></div>
  </div>

  <!-- Zeit Umrechner -->
  <div class="card">
    <h2>Zeit Umrechner</h2>

    <label>Stunden:Minuten</label>
    <input type="time" id="timeNormal" value="01:30" oninput="toHundertLive()">

    <label>HCM (100er Einheiten)</label>
    <input type="number" step="0.01" id="timeHundert" value="1.50" oninput="toTimeLive()">

    <div class="result" id="convResult"></div>
  </div>

</div>

<script>
// ===== ZA Rechner =====

function toMinutes(time) {
  let parts = time.split(":");
  return parseInt(parts[0]) * 60 + parseInt(parts[1]);
}

function formatTime(min) {
  let sign = min < 0 ? "-" : "";
  min = Math.abs(min);

  let h = Math.floor(min / 60);
  let m = min % 60;

  return sign + h + ":" + (m < 10 ? "0" + m : m);
}

function autoPause() {
  let end = document.getElementById("end").value;
  let pauseInput = document.getElementById("pause");

  if (!end) return;

  let hour = parseInt(end.split(":")[0]);

  pauseInput.value = (hour < 13) ? "00:15" : "00:45";
}

function calc() {
  let start = document.getElementById("start").value;
  let end = document.getElementById("end").value;
  let pause = document.getElementById("pause").value;
  let soll = document.getElementById("soll").value;

  if (!start || !end || !soll) {
    document.getElementById("result").innerHTML = "⚠️ Bitte alles eingeben";
    return;
  }

  let arbeitszeit = (toMinutes(end) - toMinutes(start)) - toMinutes(pause);
  let ueberstunden = arbeitszeit - toMinutes(soll);

  let resultEl = document.getElementById("result");

  resultEl.style.color = ueberstunden < 0 ? "red" : "green";

  let text = (ueberstunden > 0 ? "+" : "") + formatTime(ueberstunden);

  resultEl.innerHTML = "Überstunden: " + text;
}


// ===== LIVE UMRECHNER =====

// hh:mm -> 100er
function toHundertLive() {
  let time = document.getElementById("timeNormal").value;
  if (!time) return;

  let [h, m] = time.split(":").map(Number);

  let hund = Math.round((m / 60) * 100);

  // ✅ Überlauf fix (z.B. 59 → 100)
  if (hund === 100) {
    h += 1;
    hund = 0;
  }

  let result = h + "." + (hund < 10 ? "0" + hund : hund);

  document.getElementById("timeHundert").value = result;
  document.getElementById("convResult").innerHTML =
    time + " → " + result + " (100er)";
}


// 100er -> hh:mm
function toTimeLive() {
  let val = parseFloat(document.getElementById("timeHundert").value);
  if (isNaN(val)) return;

  let h = Math.floor(val);
  let hund = val - h;

  let m = Math.round(hund * 60);

  // ✅ Überlauf fix
  if (m === 60) {
    h += 1;
    m = 0;
  }

  let result = h + ":" + (m < 10 ? "0" + m : m);

  document.getElementById("timeNormal").value = result;
  document.getElementById("convResult").innerHTML =
    val + " → " + result;
}

// ✅ Beim Start automatisch berechnen
window.onload = function() {
  toHundertLive();
};


</script>

<div class="credit">by @uig70091</div>

</body>
</html>
